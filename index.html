<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List | M-Prog</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="container">
        <h1>To-Do List</h1>

        <!-- Start Filters -->
        <!-- Filter the tasks by if it completed or not - or all tasks -->
        <div class="filters-section">

            <div class="filters-by-completed">

                <div data-completed="true" class="filter">
                    <span>Completed</span>
                    <i class='bx bx-check'></i>
                </div>

                <div data-completed="false" class="filter">
                    <span>Not Completed</span>
                    <i class='bx bx-check'></i>
                </div>

                <div data-completed="all" class="filter selected">
                    <span>All Tasks</span>
                    <i class='bx bx-check'></i>
                </div>
            </div>

            <!-- Filter the tasks by its type or lesson name as example for the type of the task -->
            <div class="filters-by-type">
                <span data-type="all" class="selected">All</span>
            </div>
        </div>
        <!-- End Filters -->

        <!-- Start Tasks Box -->
        <div class="tasks-area"></div>
        <!-- End Tasks Box -->

        <!-- Add New Task Section -->
        <button class="new-task-btn">+</button>

        <div class="popup">
            <div class="blur-layer"></div>
            <form>
                <div class="new-task-container">
                    <h2>Add A Task</h2>

                    <div class="input-container">
                        <input type="text" id="name" required>
                        <label for="name">Task Name</label>
                    </div>

                    <div class="input-container">
                        <textarea id="description" required></textarea>
                        <label for="description">Task Description</label>
                    </div>

                    <div class="input-container">
                        <input type="text" id="type" required>
                        <label for="type">Task Type</label>
                    </div>
                    <button class="add-task" type="submit">Add</button>
                </div>
            </form>
        </div>
    </div>
    <!-- End Of To-Do List Project -->

    <!---------- Coded By DV.Mahmoud ---------->

    <script src="js/index.js"></script>
</body>

</html>
